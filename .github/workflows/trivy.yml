name: Trivy Security Code Scan

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  trivy-code-scan:
    name: Trivy Code Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Trivy filesystem scan (Table output)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-results-table.txt'

      - name: Run Trivy filesystem scan (JSON output)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          output: 'trivy-results.json'

      - name: Generate Markdown report
        if: always()
        run: |
          echo "# 🛡️ Trivy Security Scan Report" > trivy-report.md
          echo "" >> trivy-report.md
          echo "**Repository:** \`${{ github.repository }}\`" >> trivy-report.md
          echo "**Branch:** \`${{ github.ref_name }}\`" >> trivy-report.md
          echo "**Commit:** \`${{ github.sha }}\`" >> trivy-report.md
          echo "**Scan Date:** \`$(date -u +'%Y-%m-%d %H:%M:%S UTC')\`" >> trivy-report.md
          echo "**Triggered by:** \`${{ github.actor }}\`" >> trivy-report.md
          echo "" >> trivy-report.md
          echo "---" >> trivy-report.md
          echo "" >> trivy-report.md

          # Parse JSON to generate summary counts
          if [ -f trivy-results.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json 2>/dev/null || echo "0")
            TOTAL=$((CRITICAL + HIGH + MEDIUM))

            echo "## 📊 Summary" >> trivy-report.md
            echo "" >> trivy-report.md
            echo "| Severity | Count |" >> trivy-report.md
            echo "|----------|-------|" >> trivy-report.md
            echo "| 🔴 CRITICAL | ${CRITICAL} |" >> trivy-report.md
            echo "| 🟠 HIGH | ${HIGH} |" >> trivy-report.md
            echo "| 🟡 MEDIUM | ${MEDIUM} |" >> trivy-report.md
            echo "| **Total** | **${TOTAL}** |" >> trivy-report.md
            echo "" >> trivy-report.md

            if [ "$TOTAL" -eq 0 ]; then
              echo "> ✅ **No vulnerabilities found!** The codebase looks clean." >> trivy-report.md
            else
              echo "> ⚠️ **${TOTAL} vulnerabilities detected.** Please review the detailed findings below." >> trivy-report.md
            fi
            echo "" >> trivy-report.md
          fi

          echo "---" >> trivy-report.md
          echo "" >> trivy-report.md
          echo "## 📋 Detailed Findings" >> trivy-report.md
          echo "" >> trivy-report.md

          if [ -f trivy-results.json ]; then
            # Generate a vulnerability table from JSON
            echo "| Package | Vulnerability | Severity | Installed | Fix Version |" >> trivy-report.md
            echo "|---------|---------------|----------|-----------|-------------|" >> trivy-report.md

            jq -r '
              .Results[]? |
              .Target as $target |
              .Vulnerabilities[]? |
              "| \(.PkgName // "N/A") | \(.VulnerabilityID // "N/A") | \(.Severity // "N/A") | \(.InstalledVersion // "N/A") | \(.FixedVersion // "N/A") |"
            ' trivy-results.json 2>/dev/null >> trivy-report.md || echo "No vulnerability data to parse." >> trivy-report.md

            echo "" >> trivy-report.md
          fi

          echo "---" >> trivy-report.md
          echo "" >> trivy-report.md
          echo "## 📄 Full Scan Output" >> trivy-report.md
          echo "" >> trivy-report.md
          echo '```' >> trivy-report.md
          cat trivy-results-table.txt 2>/dev/null >> trivy-report.md || echo "No table output generated." >> trivy-report.md
          echo '```' >> trivy-report.md
          echo "" >> trivy-report.md
          echo "---" >> trivy-report.md
          echo "*Report generated by [Trivy](https://github.com/aquasecurity/trivy) via GitHub Actions*" >> trivy-report.md

      - name: Upload Trivy scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-security-report
          path: |
            trivy-report.md
            trivy-results.json
            trivy-results-table.txt
          retention-days: 30

      - name: Send Teams Notification
        if: always()
        run: |
          if [ -f trivy-results.json ]; then
            CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo "0")
            HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json 2>/dev/null || echo "0")
            LOW=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="LOW")] | length' trivy-results.json 2>/dev/null || echo "0")
            TARGET_TABLE=$(jq -r '
              ["Target", "Type", "CRIT", "HIGH", "MED", "LOW"],
              ["--------------------------------", "----------", "----", "----", "----", "----"],
              (.Results[]? | [
                (.Target // "N/A" | .[0:32]),
                (.Class // .Type // "N/A" | .[0:10]),
                ([.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length | tostring),
                ([.Vulnerabilities[]? | select(.Severity=="HIGH")] | length | tostring),
                ([.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length | tostring),
                ([.Vulnerabilities[]? | select(.Severity=="LOW")] | length | tostring)
              ]) | @tsv
            ' trivy-results.json 2>/dev/null | awk -F'\t' '{printf "%-32s | %-10s | %-4s | %-4s | %-4s | %-4s\n", $1, $2, $3, $4, $5, $6}' || echo "No target data")
          else
            CRITICAL=0; HIGH=0; MEDIUM=0; LOW=0
            TARGET_TABLE="No scan results found."
          fi
          REPORT_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "# 🛡️ Trivy Code Scan Report" > /tmp/teams-msg.txt
          echo "**Repository:** \`${{ github.repository }}\`" >> /tmp/teams-msg.txt
          echo "**Branch:** \`${{ github.ref_name }}\`" >> /tmp/teams-msg.txt
          echo "" >> /tmp/teams-msg.txt
          echo "## 📊 Summary" >> /tmp/teams-msg.txt
          echo "- 🔴 **CRITICAL:** ${CRITICAL}" >> /tmp/teams-msg.txt
          echo "- 🟠 **HIGH:** ${HIGH}" >> /tmp/teams-msg.txt
          echo "- 🟡 **MEDIUM:** ${MEDIUM}" >> /tmp/teams-msg.txt
          echo "- 🟢 **LOW:** ${LOW}" >> /tmp/teams-msg.txt
          echo "" >> /tmp/teams-msg.txt
          echo "## 📋 Target Breakdown" >> /tmp/teams-msg.txt
          echo "\`\`\`" >> /tmp/teams-msg.txt
          echo "${TARGET_TABLE}" >> /tmp/teams-msg.txt
          echo "\`\`\`" >> /tmp/teams-msg.txt
          echo "" >> /tmp/teams-msg.txt
          echo "🔗 [View Full Report & Download Artifacts](${REPORT_URL})" >> /tmp/teams-msg.txt
          MESSAGE=$(cat /tmp/teams-msg.txt)
          jq -n --arg msg "$MESSAGE" '{
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": [
                    {
                      "type": "TextBlock",
                      "text": $msg,
                      "wrap": true
                    }
                  ]
                }
              }
            ]
          }' > teams-payload.json
          if [ -n "${{ secrets.TRIVY_TEAM_WEBHOOK }}" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d @teams-payload.json "${{ secrets.TRIVY_TEAM_WEBHOOK }}"
            echo "Teams notification sent successfully."
          else
            echo "TRIVY_TEAM_WEBHOOK secret is not set. Skipping Teams notification."
          fi


